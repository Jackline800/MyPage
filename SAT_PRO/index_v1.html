<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>WMO 全衛星監控系統 - 完整繞極動態版</title>
    <style>
        :root { --bg: #0a0c11; --ui: #ffffff; --accent: #3498db; }
        body { margin: 0; background: var(--bg); color: #333; font-family: sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        #mobile-menu-btn {
            display: none;
            position: absolute;
            top: 15px; left: 15px;
            z-index: 1000;
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        #sidebar { 
            width: 400px; background: #fff; padding: 20px; z-index: 100; 
            box-shadow: 5px 0 15px rgba(0,0,0,0.6); 
            display: flex; flex-direction: column;
            overflow-y: auto; 
            box-sizing: border-box;
            transition: transform 0.3s ease-in-out;
        }

        #viewer { flex: 1; position: relative; background: radial-gradient(circle, #1b2735 0%, #05080c 100%); cursor: grab; }
        #viewer:active { cursor: grabbing; }

        h2 { font-size: 1.1rem; border-bottom: 2px solid var(--accent); padding-bottom: 8px; margin-top: 0; }
        .group { margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        label { font-size: 0.8rem; font-weight: bold; display: block; margin: 6px 0 3px; }
        input, select, button { width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: var(--accent); color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; }
        
        #library { border: 1px solid #eee; border-radius: 5px; padding: 5px; margin-top: 10px; background: #fafafa; }
        
        .cat-title { 
            background: #eef2f7; padding: 8px 10px; font-size: 0.75rem; font-weight: bold; 
            margin-top: 10px; border-radius: 3px; color: #2980b9; 
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: background 0.2s; user-select: none;
        }
        .cat-title:hover { background: #d6eaf8; }
        .cat-content { display: none; padding: 0 5px; }
        .cat-content.open { display: block; animation: slideDown 0.3s ease-out; }
        
        .lib-item { display: flex; align-items: center; justify-content: space-between; font-size: 0.72rem; padding: 5px 0; border-bottom: 1px solid #f2f2f2; }
        .lib-info { display: flex; align-items: center; }
        .lib-info input { width: auto; margin-right: 8px; }
        .change-btn { width: auto; font-size: 0.6rem; padding: 2px 6px; background: #95a5a6; margin: 0; }

        .sat-label {
            position: absolute; background: rgba(0,0,0,0.8); color: white;
            padding: 2px 6px; border-radius: 4px; font-size: 10px;
            pointer-events: none; white-space: nowrap; transform: translate(-50%, -140%);
            border: 1px solid rgba(255,255,255,0.3);
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            #mobile-menu-btn { display: block; }
            #sidebar {
                position: absolute; left: 0; top: 0; height: 100%;
                width: 85%; max-width: 350px; transform: translateX(-100%);
            }
            #sidebar.open { transform: translateX(0); }
            #viewer { width: 100vw; }
        }
    </style>
</head>
<body>

<button id="mobile-menu-btn" onclick="toggleSidebar()">☰ 衛星選單</button>

<div id="sidebar">
    <h2>WMO 衛星系統 (全數據匯入)</h2>
    
    <div class="group">
        <label>1. 🌍 全球觀測底圖切換</label>
        <select id="map-selector" style="margin-bottom: 8px;">
            <option value="ETOPO_CLD.png">方案一：模擬動態雲圖 (預設)</option>
            <option value="ETOPO1_ELEVATION_OL_small.png">方案二：地形底圖（一）</option>
            <option value="ETOPO1_GMT_small.png">方案三：地形底圖（二）</option>
            <option value="world.topo.bathy.jpg">方案四：Blue_Marble_bathy</option>
			<option value="City_Light_ETOPO.png">方案五：城市夜間燈光圖</option>
			<option value="界王星_base.png">方案六：界王星</option>
        </select>
        <label style="font-size: 0.75rem; color: #7f8c8d; font-weight: normal;">或手動匯入本地地圖：</label>
        <input type="file" id="map-upload" accept="image/*">
    </div>

    <div class="group">
        <label>2. 🛰️ 軌道半徑/高度調整</label>
        <div style="margin-bottom: 8px;">
            <span style="font-size: 0.75rem; color: #555;">同步軌道遠近 (GEO Radius):</span>
            <input type="range" id="geo-radius-ctrl" min="3.3" max="6.0" step="0.05" value="3.65">
        </div>
        <div>
            <span style="font-size: 0.75rem; color: #555;">低軌/繞極遠近 (LEO Radius):</span>
            <input type="range" id="leo-radius-ctrl" min="3.05" max="4.5" step="0.05" value="3.25">
        </div>
    </div>

    <div class="group">
        <label>3. 地球自轉速度控制</label>
        <div style="display: flex; align-items: center; gap: 10px;">
            <input type="range" id="speed-ctrl" min="0" max="0.01" step="0.0001" value="0.001">
            <button id="rot-btn" onclick="toggleRotation()" style="width:80px;">暫停</button>
        </div>
    </div>

    <div class="group">
        <label>4. 衛星庫 (點擊分類展開/收合)</label>
        <div id="library"></div>
    </div>

    <div class="group">
        <label>5. 手動新增衛星</label>
        <div style="display: flex; gap: 3px; margin-bottom: 5px;">
            <input type="text" id="cust-name" placeholder="名稱" style="flex:2;">
            <select id="cust-orb" style="flex:2; padding: 4px; font-size: 0.8rem; border-radius: 5px; border: 1px solid #ddd;">
                <option value="GEO">同步軌道 (GEO)</option>
                <option value="LEO_WX">低軌/繞極 (氣象)</option>
                <option value="LEO_ENV">低軌/繞極 (環境)</option>
            </select>
        </div>
        <div style="display: flex; gap: 3px;">
            <input type="number" id="cust-lon" placeholder="經度 (如 121)" style="flex:1;">
            <input type="number" id="cust-lat" placeholder="緯度 (如 23)" style="flex:1;">
        </div>
        <button style="background: #27ae60;" onclick="addCustom()">部署衛星</button>
    </div>
    
    <input type="file" id="hidden-file-input" style="display:none;" accept="image/*">
</div>

<div id="viewer"></div>

    function getViewerWidth() {
        return window.innerWidth <= 768 ? window.innerWidth : window.innerWidth - 400;
    }

    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('open');
    }

    document.getElementById('viewer').addEventListener('mousedown', () => {
        if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
    });
    document.getElementById('viewer').addEventListener('touchstart', () => {
        if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
    });

    function init() {
        scene = new THREE.Scene();
        const viewerWidth = getViewerWidth();
        camera = new THREE.PerspectiveCamera(45, viewerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 10;
        
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(viewerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio > 1 ? 1.5 : 1);
        document.getElementById('viewer').appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.minDistance = 4; controls.maxDistance = 25;

        const globeMat = new THREE.MeshPhongMaterial({ color: 0x1b4f72, shininess: 15 });
        globe = new THREE.Mesh(
			new THREE.SphereGeometry(GLOBE_RADIUS, 64, 64),
			globeMat
		);
        scene.add(globe);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2); sun.position.set(5, 5, 5); scene.add(sun);
        scene.add(new THREE.AmbientLight(0x555555));

        buildLibrary();
        setupMapSelector();
        setupRadiusSliders(); 

        new THREE.TextureLoader().load('ETOPO_CLD.png', t => {
            globe.material.map = t;
            globe.material.color.setHex(0xffffff);
            globe.material.needsUpdate = true;
        }, undefined, err => {
            console.error("預設底圖載入失敗，可能正在本機執行或解析度過大", err);
        });

        animate();
    }

    function setupRadiusSliders() {
        document.getElementById('geo-radius-ctrl').oninput = function(e) {
            geoRadius = parseFloat(e.target.value);
            updateStaticGeoPositions(); 
        };
        document.getElementById('leo-radius-ctrl').oninput = function(e) {
            leoRadius = parseFloat(e.target.value);
        };
    }

    function updateStaticGeoPositions() {
        labelPairs.forEach(p => {
            if (p.satData.orb === "GEO") {
                const phi = (90 - p.satData.lat) * (Math.PI / 180);
                const theta = (p.satData.lon + 180) * (Math.PI / 180);
                p.mesh.position.set(-geoRadius * Math.sin(phi) * Math.cos(theta), geoRadius * Math.cos(phi), geoRadius * Math.sin(phi) * Math.sin(theta));
            }
        });
    }
	function latLonToVector3(lat, lon, radius) {
		const phi = (90 - lat) * Math.PI / 180;
		const theta = (lon + 180) * Math.PI / 180;

		return new THREE.Vector3(
			-radius * Math.sin(phi) * Math.cos(theta),
			radius * Math.cos(phi),
			radius * Math.sin(phi) * Math.sin(theta)
		);
	}

	function placeOnGlobe(obj, lat, lon, radius = GLOBE_RADIUS + 0.05, spin = 0) {
		const pos = latLonToVector3(lat, lon, radius);
		const normal = pos.clone().normalize();

		obj.position.copy(pos);

		obj.quaternion.setFromUnitVectors(
			new THREE.Vector3(0, 1, 0),
			normal
		);

		obj.rotateY(spin);
	}

	function clearKingKaiObjects() {
		if (kingKaiGroup) {
			globe.remove(kingKaiGroup);

			kingKaiGroup.traverse(obj => {
				if (obj.geometry) obj.geometry.dispose();

				if (obj.material) {
					if (Array.isArray(obj.material)) {
						obj.material.forEach(m => m.dispose());
					} else {
						obj.material.dispose();
					}
				}
			});

			kingKaiGroup = null;
		}
	}

	function createKingKaiObjects() {
		clearKingKaiObjects();

		kingKaiGroup = new THREE.Group();

		// 圓頂房子
		const house = new THREE.Group();

		const domeMat = new THREE.MeshPhongMaterial({ color: 0xd9a45f });
		const doorMat = new THREE.MeshPhongMaterial({ color: 0x4b4b4b });

		const dome = new THREE.Mesh(
			new THREE.SphereGeometry(0.35, 32, 16),
			domeMat
		);
		dome.scale.y = 0.65;
		dome.position.y = 0.18;
		house.add(dome);

		const base = new THREE.Mesh(
			new THREE.CylinderGeometry(0.35, 0.35, 0.18, 32),
			domeMat
		);
		base.position.y = 0.05;
		house.add(base);

		const door = new THREE.Mesh(
			new THREE.BoxGeometry(0.12, 0.18, 0.03),
			doorMat
		);
		door.position.set(0, 0.08, 0.35);
		house.add(door);

		placeOnGlobe(house, 35, 20, GLOBE_RADIUS + 0.08, 0);
		kingKaiGroup.add(house);

		// 小屋
		const shed = new THREE.Group();

		const shedBody = new THREE.Mesh(
			new THREE.BoxGeometry(0.35, 0.25, 0.28),
			new THREE.MeshPhongMaterial({ color: 0xc89b57 })
		);
		shedBody.position.y = 0.13;
		shed.add(shedBody);

		placeOnGlobe(shed, 28, 55, GLOBE_RADIUS + 0.06, 0.5);
		kingKaiGroup.add(shed);

		// 車子
		const car = new THREE.Group();

		const carBody = new THREE.Mesh(
			new THREE.BoxGeometry(0.35, 0.12, 0.18),
			new THREE.MeshPhongMaterial({ color: 0xd71920 })
		);
		carBody.position.y = 0.08;
		car.add(carBody);

		const carRoof = new THREE.Mesh(
			new THREE.BoxGeometry(0.18, 0.08, 0.15),
			new THREE.MeshPhongMaterial({ color: 0xffffff })
		);
		carRoof.position.y = 0.18;
		car.add(carRoof);

		placeOnGlobe(car, 0, 25, GLOBE_RADIUS + 0.08, Math.PI / 2);
		kingKaiGroup.add(car);

		// 樹木
		const treePositions = [
			[35, -40],
			[20, -90],
			[15, 100],
			[-25, -60],
			[-30, 80],
			[45, 140]
		];

		treePositions.forEach(([lat, lon]) => {
			const tree = createSimpleTree();
			placeOnGlobe(tree, lat, lon, GLOBE_RADIUS + 0.05, 0);
			kingKaiGroup.add(tree);
		});

		globe.add(kingKaiGroup);
	}

	function createSimpleTree() {
		const tree = new THREE.Group();

		const trunk = new THREE.Mesh(
			new THREE.CylinderGeometry(0.035, 0.05, 0.22, 12),
			new THREE.MeshPhongMaterial({ color: 0x7a4a20 })
		);
		trunk.position.y = 0.1;
		tree.add(trunk);

		const leaf = new THREE.Mesh(
			new THREE.SphereGeometry(0.18, 16, 16),
			new THREE.MeshPhongMaterial({ color: 0x2f8f2f })
		);
		leaf.position.y = 0.28;
		tree.add(leaf);

		return tree;
	}
    function setupMapSelector() {
		document.getElementById('map-selector').onchange = function(e) {
			const selectedPath = e.target.value;

			new THREE.TextureLoader().load(selectedPath, t => { 
				globe.material.map = t; 
				globe.material.color.setHex(0xffffff);
				globe.material.needsUpdate = true;

				if (selectedPath.includes("界王星")) {
					createKingKaiObjects();
				} else {
					clearKingKaiObjects();
				}

			}, undefined, err => {
				alert("⚠️ 載入失敗！找不到圖片：" + selectedPath + "\n請確認是否已上傳至同資料夾中。");
			});
		};
	}

    // ★ 升級：加入全選與防衝突邏輯 ★
    function buildLibrary() {
        const lib = document.getElementById('library'); 
        lib.innerHTML = '';
        
        const categories = {};
        satDatabase.forEach((sat, i) => {
            if (!categories[sat.cat]) categories[sat.cat] = [];
            categories[sat.cat].push({ sat: sat, index: i });
        });

        for (const [catName, items] of Object.entries(categories)) {
            const header = document.createElement('div');
            header.className = 'cat-title';
            // 加入全選按鈕，並利用 style 與 class 進行區隔
            header.innerHTML = `
                <div style="display:flex; align-items:center; gap:8px;">
                    <span>${catName} (${items.length})</span>
                    <button class="select-all-btn" style="padding: 2px 6px; font-size: 0.65rem; width: auto; margin: 0; background: #2980b9; border-radius: 4px;">全選</button>
                </div>
                <span class="cat-icon">▼</span>
            `;
            
            const content = document.createElement('div');
            content.className = 'cat-content';
            
            // 點擊標題列展開/收合
            header.onclick = (e) => {
                // 防衝突：如果點擊的是「全選」按鈕，則不觸發手風琴收合
                if(e.target.classList.contains('select-all-btn')) return;

                const isOpen = content.classList.contains('open');
                content.classList.toggle('open');
                header.querySelector('.cat-icon').innerText = isOpen ? '▼' : '▲';
            };

            // 實作全選按鈕邏輯
            const selectAllBtn = header.querySelector('.select-all-btn');
            selectAllBtn.onclick = (e) => {
                e.stopPropagation(); // 雙重防止觸發外層 onClick
                const isSelectAll = selectAllBtn.innerText === '全選';
                
                // 切換按鈕外觀與文字
                selectAllBtn.innerText = isSelectAll ? '全清' : '全選';
                selectAllBtn.style.background = isSelectAll ? '#e74c3c' : '#2980b9'; // 全清變紅色，全選變藍色

                // 批次勾選或取消該分類下的所有衛星
                items.forEach(item => {
                    const idx = item.index;
                    const chk = document.getElementById(`chk-${idx}`);
                    if (chk && chk.checked !== isSelectAll) {
                        chk.checked = isSelectAll;
                        toggleSat(idx); // 觸發實際的 3D 繪圖更新
                    }
                });
            };

            items.forEach(item => {
                const idx = item.index;
                const sat = item.sat;
                const itemDiv = document.createElement('div');
                itemDiv.className = 'lib-item';
                itemDiv.innerHTML = `
                    <div class="lib-info">
                        <input type="checkbox" id="chk-${idx}" onchange="toggleSat(${idx})">
                        <span>${sat.name}</span>
                    </div>
                    <button class="change-btn" onclick="triggerFile(${idx})">換圖</button>
                `;
                content.appendChild(itemDiv);
            });

            lib.appendChild(header);
            lib.appendChild(content);
        }
    }

    function toggleRotation() { isRotating = !isRotating; document.getElementById('rot-btn').innerText = isRotating ? "暫停" : "開始"; }
    function triggerFile(idx) { targetIdx = idx; document.getElementById('hidden-file-input').click(); }

    document.getElementById('hidden-file-input').onchange = function(e) {
        if (e.target.files && e.target.files[0]) {
            const r = new FileReader(); r.onload = ev => {
                satDatabase[targetIdx].icon = ev.target.result;
                if (activeSats.has(targetIdx)) { removeSat(targetIdx); toggleSat(targetIdx); }
            }; r.readAsDataURL(e.target.files[0]);
        }
    };

    function toggleSat(idx) {
        const sat = satDatabase[idx]; const chk = document.getElementById(`chk-${idx}`);
        if (chk.checked) { activeSats.set(idx, createSatObj(sat)); } else { removeSat(idx); }
    }

    function removeSat(idx) {
        const d = activeSats.get(idx); if (d) { 
            if (d.satData.orb === "GEO") globe.remove(d.mesh); else scene.remove(d.mesh);
            d.element.remove(); 
            labelPairs.splice(labelPairs.indexOf(d), 1); activeSats.delete(idx); 
        }
    }

    function createSatObj(sat) {
        const phi = (90 - sat.lat) * (Math.PI / 180), theta = (sat.lon + 180) * (Math.PI / 180);
        const container = new THREE.Group();
        
        const fallbackMesh = new THREE.Mesh(new THREE.SphereGeometry(0.06, 16, 16), new THREE.MeshBasicMaterial({ color: sat.color }));
        container.add(fallbackMesh);

        if (sat.icon) {
            new THREE.TextureLoader().load(sat.icon, t => {
                container.remove(fallbackMesh);
                const spriteMat = new THREE.SpriteMaterial({ map: t });
                const sprite = new THREE.Sprite(spriteMat);
                sprite.scale.set(0.4, 0.4, 1);
                container.add(sprite);
            }, undefined, err => {
                console.log(`未檢測到去背圖檔：${sat.icon}，已自動切換為高亮圓點標註。`);
            });
        }

        if (sat.orb === "GEO") {
            container.position.set(-geoRadius * Math.sin(phi) * Math.cos(theta), geoRadius * Math.cos(phi), geoRadius * Math.sin(phi) * Math.sin(theta));
            globe.add(container);
        } else {
            scene.add(container);
        }

        const el = document.createElement('div'); el.className = 'sat-label'; el.innerText = sat.name;
        document.getElementById('viewer').appendChild(el);
        const pair = { element: el, mesh: container, satData: sat, offset: Math.random() * 100 }; 
        labelPairs.push(pair); return pair;
    }

    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now() * 0.001;
        if (isRotating) globe.rotation.y += parseFloat(document.getElementById('speed-ctrl').value);
        controls.update();

        labelPairs.forEach(p => {
            if (p.satData.orb === "LEO") {
                const speed = 0.4;
                const angle = time * speed + p.offset;
                
                const y = leoRadius * Math.cos(angle);
                const r_xz = leoRadius * Math.sin(angle);
                const lonRad = (p.satData.lon || 0) * (Math.PI / 180);
                
                const x = -r_xz * Math.cos(lonRad);
                const z = r_xz * Math.sin(lonRad);
                p.mesh.position.set(x, y, z);
            }
            const worldPos = new THREE.Vector3(); p.mesh.getWorldPosition(worldPos);
            
            const viewerW = getViewerWidth();
            const offsetLeft = window.innerWidth <= 768 ? 0 : 400;

            const cameraDist = camera.position.distanceTo(worldPos), globeDist = camera.position.distanceTo(globe.position);
            if (cameraDist > globeDist + 0.1) { p.element.style.display = 'none'; } else {
                p.element.style.display = 'block'; const screenPos = worldPos.project(camera);
                p.element.style.left = `${(screenPos.x * 0.5 + 0.5) * viewerW + offsetLeft}px`;
                p.element.style.top = `${(-(screenPos.y * 0.5 - 0.5)) * window.innerHeight}px`;
            }
        });
        renderer.render(scene, camera);
    }

    function addCustom() {
        const n = document.getElementById('cust-name').value || "未命名衛星";
        const lo = parseFloat(document.getElementById('cust-lon').value) || 0;
        const la = parseFloat(document.getElementById('cust-lat').value) || 0;
        const orbType = document.getElementById('cust-orb').value;
        
        let category = "手動新增";
        let orb = "GEO";
        let color = 0x27ae60;
        let iconPath = undefined;
        
        if (orbType === "GEO") {
            category = "GEO 靜止軌道";
            orb = "GEO";
            color = 0xffa502;
        } else if (orbType === "LEO_WX") {
            category = "低軌/繞極 (氣象為主)";
            orb = "LEO";
            color = 0x1dd1a1;
            iconPath = "衛星/繞極/custom_wx.png"; 
        } else if (orbType === "LEO_ENV") {
            category = "低軌/繞極 (環境為主)";
            orb = "LEO";
            color = 0x5f27cd;
            iconPath = "衛星/繞極/custom_env.png"; 
        }
        
        satDatabase.push({ cat: category, name: n, lon: lo, lat: la, orb: orb, color: color, icon: iconPath });
        buildLibrary(); 
        
        const idx = satDatabase.length - 1;
        document.getElementById(`chk-${idx}`).checked = true; 
        toggleSat(idx);
        
        const allContents = document.querySelectorAll('.cat-content');
        const lastContent = allContents[allContents.length - 1];
        if (lastContent && !lastContent.classList.contains('open')) {
            lastContent.classList.add('open');
            const lastHeaderIcon = lastContent.previousElementSibling.querySelector('.cat-icon');
            if (lastHeaderIcon) lastHeaderIcon.innerText = '▲';
        }
    }

    window.addEventListener('resize', () => {
        const viewerWidth = getViewerWidth();
        camera.aspect = viewerWidth / window.innerHeight; 
        camera.updateProjectionMatrix();
        renderer.setSize(viewerWidth, window.innerHeight);
    });

    init();
</script>
</body>
</html>
